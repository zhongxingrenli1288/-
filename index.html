<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>中興仁里民宿 | 房況管理</title>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
    body { margin: 0; font-family: "Segoe UI", Arial; background: #f3f1ec; color: #333; }
    .header { background: white; padding: 25px 40px; font-size: 40px; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .container { max-width: 1400px; margin: auto; padding: 30px; }
    .card { background: white; border-radius: 18px; padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }

    /* 房間按鈕 */
    .room-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
    .room-btn { font-size: 40px; padding: 20px 10px; border: none; border-radius: 20px; color: white; cursor: pointer; transition: 0.2s; font-weight: bold; }
    .room-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
    
    .r201 { background: #3A7BD5; } .r202 { background: #00B894; }
    .r301 { background: #f3bf12; } .r302 { background: #8E44AD; }
    .rWood { background: #9a5404; }

    /* 篩選器樣式 */
    .filter-group { display: flex; gap: 20px; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #ccc; }
    .filter-group select { font-size: 30px; padding: 8px; border-radius: 8px; border: 2px solid #ddd; }

    .add-booking-btn { background: linear-gradient(135deg, #667eea, #be91eb); color: white; font-size: 24px; padding: 15px 30px; border: none; border-radius: 12px; cursor: pointer; margin-top: 20px; width: 100%; }

    /* --- 表格樣式修正區 --- */
    table { border-collapse: collapse; width: 100%; margin-top: 15px; font-size: 20px; }
    
    th { 
        background: #efefef; 
        text-align: center; /* 表頭文字置中 */
        padding: 15px; 
        border: 1.5px solid #bbb !important;
    }
    
    td { 
        padding: 15px; 
        border: 1.5px solid #bbb !important; 
        vertical-align: middle; 
        text-align: center; /* 預設所有內容置中 */
    }

    /* 針對特定欄位調整對齊方式 */
    #bookingTableBody td:nth-child(1), /* 姓名：靠左 */
    #bookingTableBody td:nth-child(7)  /* 備註：靠左 */ {
        text-align: left;
    }

    #bookingTableBody td:nth-child(5) {
    text-align: left;
    font-weight: bold; /*變粗體*/
    }
    /* 日期、金額、付款狀態：強制置中 */
    #bookingTableBody td:nth-child(3), /* 入住 */
    #bookingTableBody td:nth-child(4), /* 退房 */
    #bookingTableBody td:nth-child(5), /* 金額 */
    #bookingTableBody td:nth-child(6)  /* 付款狀態 */ {
        text-align: center;
    }
    /* ----------------------- */

    .row-manual { background: #fff3a0; } 
    .row-booking { background: #ffffff; }

    .jump-highlight { 
        background-color: #fff3cd !important;
        border: 3px solid #ffc107 !important;
        transition: background-color 0.3s;
    }

    .btn-edit { background-color: #4A90E2; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-right: 8px; font-weight: bold; }
    .btn-delete { background-color: #E74C3C; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
    
    .status-paid { background-color: #00B894 !important; color: white; font-weight: bold; text-align: center; }
    .status-deposit { background-color: #f3f709 !important; color: #040404; font-weight: bold; text-align: center; }
    .status-none { background-color: #da4c3f !important; color: white; font-weight: bold; text-align: center; }
    
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
    .form-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 18px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); display: none; z-index: 1000; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
    .form-popup input, .form-popup select { width: 100%; padding: 15px; margin: 10px 0; border: 3px solid #ddd; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
    
    .fc { font-size: 1.3rem; margin-top: 30px; }
    .fc-event-title { cursor: pointer; }
    </style>
</head>

<body>

<div class="header">🏡 中興仁里民宿 房況管理系統</div>

<div class="container">
    <div class="card">
        <h2>📅 快速查看與切換</h2>
        <div class="room-grid">
            <button class="room-btn r201" onclick="selectRoom('201')">201</button>
            <button class="room-btn r202" onclick="selectRoom('202')">202</button>
            <button class="room-btn r301" onclick="selectRoom('301')">301</button>
            <button class="room-btn r302" onclick="selectRoom('302')">302</button>
            <button class="room-btn rWood" onclick="selectRoom('木間仁風')">木間仁風</button>
        </div>

        <div class="filter-group">
            <span>🔍 篩選：</span>
            <select id="sourceFilter" onchange="renderFilteredTable()">
                <option value="all">所有來源 (全部)</option>
                <option value="Booking同步">Booking 同步</option>
                <option value="manual">手動輸入</option>
            </select>
            <select id="dateFilter" onchange="renderFilteredTable()">
                <option value="all">所有日期</option>
                <option value="future">今天及未來訂單</option>
            </select>
        </div>

        <button class="add-booking-btn" onclick="openBookingForm()">➕ 新增訂單</button>
    </div>

    <div class="card" id="listCard">
        <h2>📋 <span id="currentRoomDisplay">201</span> 房訂單列表</h2>
        <table>
            <thead>
                <tr>
                    <th>姓名</th><th>電話</th><th>入住</th><th>退房</th><th>金額</th><th>付款狀態</th><th>備註</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="bookingTableBody"></tbody>
        </table>
        <div id="calendar"></div>
    </div>
</div>

<div id="overlay" class="overlay" onclick="closeForm()"></div>
<div id="bookingForm" class="form-popup">
    <h3 id="formTitle">新增訂單</h3>
    <input type="hidden" id="editId">
    房號：
    <select id="room">
        <option>201</option><option>202</option><option>301</option><option>302</option><option>木間仁風</option>
    </select>
    姓名：<input id="guest" placeholder="旅客姓名">
    電話：<input id="phone" placeholder="電話號碼">
    入住：<input id="checkin" type="date">
    退房：<input id="checkout" type="date">
    金額：<input id="amount" type="number" placeholder="手動輸入金額">
    付款狀態：
    <select id="payment_status">
        <option value="已付清">已付清</option>
        <option value="只付訂金">只付訂金</option>
        <option value="還沒繳錢" selected>還沒繳錢</option>
    </select>
    備註：<input id="note" placeholder="例如：加床、早餐...">
    <div class="form-btns">
        <button style="background: #33e247; color: white; padding: 15px; border-radius: 8px; border:none; cursor:pointer; font-weight:bold;" onclick="saveBooking()">儲存</button>
        <button style="background: #eee; padding: 15px; border-radius: 8px; border:none; cursor:pointer;" onclick="closeForm()">關閉</button>
    </div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
    "https://bibliidwczaxrxuiagjx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpYmxpaWR3Y3pheHJ4dWlhZ2p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NzM3OTEsImV4cCI6MjA4NjE0OTc5MX0.j68sBe6nWcd0txkk00ReYfca6qf9VC88mVkfSxOlKx4"
);

let currentRoom = "201";
let calendar;
let currentRawData = []; 
const roomColors = { "201": "#3A7BD5", "202": "#00B894", "301": "#f3bf12", "302": "#8E44AD", "木間仁風": "#9a5404" };

function formatChineseDate(dateStr) {
    if (!dateStr) return "";
    const parts = dateStr.split("-");
    return parts.length !== 3 ? dateStr : `${parseInt(parts[1])}月${parseInt(parts[2])}日`;
}

async function loadBookings(room) {
    document.getElementById("currentRoomDisplay").innerText = room;
    let { data } = await supabaseClient.from("bookings").select("*").eq("room", room).order("check_in");
    currentRawData = data || []; 
    renderFilteredTable();
}

function renderFilteredTable() {
    const sourceFilter = document.getElementById("sourceFilter").value;
    const dateFilter = document.getElementById("dateFilter").value;
    const today = new Date().toISOString().split('T')[0];

    let tbody = document.getElementById("bookingTableBody");
    tbody.innerHTML = "";

    const filtered = currentRawData.filter(b => {
        const matchSource = (sourceFilter === "all") || 
                           (sourceFilter === "manual" ? (b.source === "manual") : (b.source !== "manual"));
        const matchDate = (dateFilter === "all") || (b.check_in >= today);
        return matchSource && matchDate;
    });

    filtered.forEach(b => {
        let rowClass = (b.source === "manual") ? "row-manual" : "row-booking";
        let statusClass = b.payment_status === "已付清" ? "status-paid" : (b.payment_status === "只付訂金" ? "status-deposit" : "status-none");

        tbody.innerHTML += `
            <tr id="order-${b.id}" class="${rowClass}">
                <td>${b.guest_name}</td>
                <td>${b.phone || ""}</td>
                <td>${formatChineseDate(b.check_in)}</td>
                <td>${formatChineseDate(b.check_out)}</td>
                <td>${b.amount ? '$' + b.amount : ""}</td>
                <td class="${statusClass}">${b.payment_status || ""}</td>
                <td>${b.note || ""}</td>
                <td>
                    <button class="btn-edit" onclick='editBooking(${JSON.stringify(b)})'>修改</button>
                    <button class="btn-delete" onclick="deleteBooking(${b.id})">刪除</button>
                </td>
            </tr>`;
    });
}

function selectRoom(r) {
    currentRoom = r;
    loadBookings(r);
}

function initCalendar() {
    const roomOrder = { "201": 1, "202": 2, "301": 3, "302": 4, "木間仁風": 5 };
    calendar = new FullCalendar.Calendar(document.getElementById("calendar"), {
        initialView: "dayGridMonth",
        locale: 'zh-tw',
        height: 'auto',
        fixedWeekCount: false,
        eventOrder: "order",
        events: async function(fetchInfo, success) {
            let { data } = await supabaseClient.from("bookings").select("*");
            success(data.map(e => ({
                id: e.id,
                title: `${e.room}: ${e.guest_name}`,
                start: e.check_in,
                end: e.check_out,
                color: roomColors[e.room] || "#999",
                extendedProps: { room: e.room },
                order: roomOrder[e.room] || 99
            })));
        },
        eventClick: async function(info) {
            const bId = info.event.id;
            const bRoom = info.event.extendedProps.room;
            
            const scrollToOrder = () => {
                const el = document.getElementById(`order-${bId}`);
                if (el) {
                    document.querySelectorAll('.jump-highlight').forEach(row => row.classList.remove('jump-highlight'));
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.add('jump-highlight');
                }
            };

            document.getElementById("dateFilter").value = "all";
            document.getElementById("sourceFilter").value = "all";

            if (currentRoom !== bRoom) {
                currentRoom = bRoom;
                await loadBookings(bRoom); 
                setTimeout(scrollToOrder, 150);
            } else {
                renderFilteredTable();
                scrollToOrder();
            }
        }
    });
    calendar.render();
}

function openBookingForm() {
    document.getElementById("formTitle").innerText = "➕ 新增訂單";
    document.getElementById("editId").value = "";
    document.getElementById("room").value = currentRoom;
    document.getElementById("guest").value = ""; document.getElementById("phone").value = "";
    document.getElementById("checkin").value = ""; document.getElementById("checkout").value = "";
    document.getElementById("amount").value = ""; document.getElementById("payment_status").value = "還沒繳錢";
    document.getElementById("note").value = "";
    document.getElementById("bookingForm").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}
function closeForm() { document.getElementById("bookingForm").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

async function saveBooking() {
    const id = document.getElementById("editId").value;
    const amountVal = document.getElementById("amount").value;
    const payload = {
        room: document.getElementById("room").value,
        guest_name: document.getElementById("guest").value,
        phone: document.getElementById("phone").value,
        check_in: document.getElementById("checkin").value,
        check_out: document.getElementById("checkout").value,
        amount: amountVal === "" ? null : amountVal,
        payment_status: document.getElementById("payment_status").value,
        note: document.getElementById("note").value
    };
    try {
        if (id) {
            const { data: old } = await supabaseClient.from("bookings").select("source").eq("id", id).single();
            payload.source = old?.source || "manual";
            await supabaseClient.from("bookings").update(payload).eq("id", id);
        } else {
            payload.source = "manual";
            await supabaseClient.from("bookings").insert(payload);
        }
        closeForm();
        loadBookings(currentRoom);
        calendar.refetchEvents();
    } catch (err) { alert("儲存失敗！"); }
}

function editBooking(b) {
    document.getElementById("formTitle").innerText = "📝 修改訂單";
    document.getElementById("editId").value = b.id;
    document.getElementById("room").value = b.room;
    document.getElementById("guest").value = b.guest_name;
    document.getElementById("phone").value = b.phone || "";
    document.getElementById("checkin").value = b.check_in;
    document.getElementById("checkout").value = b.check_out;
    document.getElementById("amount").value = b.amount || "";
    document.getElementById("payment_status").value = b.payment_status || "還沒繳錢";
    document.getElementById("note").value = b.note || "";
    document.getElementById("bookingForm").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

async function deleteBooking(id) {
    if (!confirm("確定刪除這筆訂單嗎？")) return;
    await supabaseClient.from("bookings").delete().eq("id", id);
    loadBookings(currentRoom);
    calendar.refetchEvents();
}

initCalendar();
selectRoom("201");
</script>

</body>
</html>
