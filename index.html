<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>中興仁里民宿 | 房況管理</title>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
    body { margin: 0; font-family: "Segoe UI", Arial; background: #f3f1ec; color: #333; }
    .header { background: white; padding: 25px 40px; font-size: 40px; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .container { max-width: 1400px; margin: auto; padding: 30px; }
    .card { background: white; border-radius: 18px; padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }

    .room-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
    .room-btn { font-size: 30px; padding: 15px 5px; border: none; border-radius: 20px; color: white; cursor: pointer; transition: 0.2s; font-weight: bold; }
    .room-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
    
    .r201 { background: #3A7BD5; } .r202 { background: #00B894; }
    .r301 { background: #f3bf12; } .r302 { background: #8E44AD; }
    .rWood { background: #9a5404; }
    .rAll { background: #444; } 

    .filter-group { display: flex; gap: 15px; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #ccc; flex-wrap: wrap; }
    .filter-group select { font-size: 20px; padding: 8px; border-radius: 8px; border: 2px solid #ddd; }
    
    .pagination-wrapper { display: flex; gap: 10px; align-items: center; margin-left: auto; font-size: 18px; font-weight: bold; }
    .pagination-wrapper button { padding: 8px 15px; font-size: 16px; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background: white; transition: 0.2s; }
    .pagination-wrapper button:hover:not(:disabled) { background: #eee; }
    .pagination-wrapper button:disabled { opacity: 0.5; cursor: not-allowed; }

    .add-booking-btn { background: linear-gradient(135deg, #667eea, #be91eb); color: white; font-size: 24px; padding: 15px 30px; border: none; border-radius: 12px; cursor: pointer; margin-top: 20px; width: 100%; }

    table { border-collapse: collapse; width: 100%; margin-top: 15px; font-size: 20px; }
    th { background: #efefef; text-align: center; padding: 15px; border: 1.5px solid #bbb !important; }
    td { padding: 15px; border: 1.5px solid #bbb !important; vertical-align: middle; text-align: center; }

    .room-tag { padding: 4px 10px; border-radius: 6px; color: white; font-weight: bold; font-size: 16px; display: inline-block; }

    #bookingTableBody td:nth-child(1) { text-align: left; font-weight: bold; } 
    .row-manual { background: #fff3a0; } 
    .row-booking { background: #ffffff; }

    /* 跳轉高亮樣式 */
    .jump-highlight { background-color: #fff3cd !important; border: 3px solid #ffc107 !important; transition: background-color 0.3s; }
    
    .btn-edit { background-color: #4A90E2; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-right: 8px; font-weight: bold; }
    .btn-delete { background-color: #E74C3C; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
    
    .status-paid { background-color: #00B894 !important; color: white; font-weight: bold; }
    .status-deposit { background-color: #f3f709 !important; color: #040404; font-weight: bold; }
    .status-none { background-color: #da4c3f !important; color: white; font-weight: bold; }
    
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
    .form-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 18px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); display: none; z-index: 1000; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
    .form-popup input, .form-popup select { width: 100%; padding: 15px; margin: 10px 0; border: 3px solid #ddd; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
    
    /* 日曆加粗樣式 */
    .fc { font-size: 1.3rem; margin-top: 30px; }
    .fc .fc-toolbar-title { font-weight: 800; font-size: 2rem; }
    .fc .fc-col-header-cell-cushion { font-weight: 700; color: #333; }
    .fc .fc-daygrid-day-number { font-weight: 700; }
    .fc .fc-event-title { font-weight: 700; padding: 2px 5px; }
    .fc .fc-button { font-weight: bold; }

    #depositContainer { display: none; background: #fffde7; padding: 10px; border-radius: 8px; border: 1px solid #fbc02d; margin: 10px 0; }
    </style>
</head>

<body>

<div class="header">🏡 中興仁里民宿 房況管理系統</div>

<div class="container">
    <div class="card">
        <h2>📅 快速查看與切換</h2>
        <div class="room-grid">
            <button class="room-btn r201" onclick="selectRoom('201')">201</button>
            <button class="room-btn r202" onclick="selectRoom('202')">202</button>
            <button class="room-btn r301" onclick="selectRoom('301')">301</button>
            <button class="room-btn r302" onclick="selectRoom('302')">302</button>
            <button class="room-btn rWood" onclick="selectRoom('木間仁風')">木間仁風</button>
            <button class="room-btn rAll" onclick="selectRoom('ALL')">🏨 所有房號</button>
        </div>

        <div class="filter-group">
            <span>🔍 篩選：</span>
            <select id="sourceFilter" onchange="resetPageAndRender()">
                <option value="all">所有來源</option>
                <option value="Booking同步">Booking 同步</option>
                <option value="manual">手動輸入</option>
            </select>
            
            <select id="monthFilter" onchange="resetPageAndRender()">
                <option value="all">所有月份</option>
                <option value="01">1月</option><option value="02">2月</option>
                <option value="03">3月</option><option value="04">4月</option>
                <option value="05">5月</option><option value="06">6月</option>
                <option value="07">7月</option><option value="08">8月</option>
                <option value="09">9月</option><option value="10">10月</option>
                <option value="11">11月</option><option value="12">12月</option>
            </select>

            <select id="dateFilter" onchange="resetPageAndRender()">
                <option value="all">所有日期</option>
                <option value="future">今天及未來</option>
            </select>

            <div id="paginationControls" class="pagination-wrapper"></div>
        </div>

        <button class="add-booking-btn" onclick="openBookingForm()">➕ 新增訂單</button>
    </div>

    <div class="card" id="listCard">
        <h2>📋 <span id="currentRoomDisplay">201</span> 房訂單列表</h2>
        <table>
            <thead id="tableHeader"></thead>
            <tbody id="bookingTableBody"></tbody>
        </table>
        <div id="calendar"></div>
    </div>
</div>

<div id="overlay" class="overlay" onclick="closeForm()"></div>
<div id="bookingForm" class="form-popup">
    <h3 id="formTitle">新增訂單</h3>
    <input type="hidden" id="editId">
    房號：<select id="room"><option>201</option><option>202</option><option>301</option><option>302</option><option>木間仁風</option></select>
    姓名：<input id="guest" placeholder="旅客姓名">
    電話：<input id="phone" placeholder="電話號碼">
    入住：<input id="checkin" type="date">
    退房：<input id="checkout" type="date">
    總金額：<input id="amount" type="number" placeholder="請輸入總額">
    
    付款狀態：
    <select id="payment_status" onchange="toggleDepositInput()">
        <option value="已付清">已付清</option>
        <option value="只付訂金">只付訂金</option>
        <option value="還沒繳錢" selected>還沒繳錢</option>
    </select>

    <div id="depositContainer">
        訂金金額：<input id="deposit_amount" type="number" placeholder="請輸入已收訂金">
    </div>

    備註：<input id="note" placeholder="例如：加床、早餐...">
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button style="flex:1; background: #33e247; color: white; padding: 15px; border-radius: 8px; border:none; cursor:pointer; font-weight:bold;" onclick="saveBooking()">儲存</button>
        <button style="flex:1; background: #eee; padding: 15px; border-radius: 8px; border:none; cursor:pointer;" onclick="closeForm()">關閉</button>
    </div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
    "https://bibliidwczaxrxuiagjx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpYmxpaWR3Y3pheHJ4dWlhZ2p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NzM3OTEsImV4cCI6MjA4NjE0OTc5MX0.j68sBe6nWcd0txkk00ReYfca6qf9VC88mVkfSxOlKx4"
);

let currentRoom = "201";
let calendar; 
let currentRawData = []; 
let currentPage = 1;
const rowsPerPage = 10;
const roomColors = { "201": "#3A7BD5", "202": "#00B894", "301": "#f3bf12", "302": "#8E44AD", "木間仁風": "#9a5404" };

function toggleDepositInput() {
    const status = document.getElementById("payment_status").value;
    const container = document.getElementById("depositContainer");
    container.style.display = (status === "只付訂金") ? "block" : "none";
}

function formatChineseDate(dateStr) {
    if (!dateStr) return "";
    const parts = dateStr.split("-");
    return parts.length !== 3 ? dateStr : `${parseInt(parts[1])}月${parseInt(parts[2])}日`;
}

async function loadBookings(room) {
    document.getElementById("currentRoomDisplay").innerText = (room === "ALL" ? "所有房號" : room);
    let query = supabaseClient.from("bookings").select("*");
    if (room !== "ALL") query = query.eq("room", room);
    let { data } = await query.order("check_in", { ascending: false });
    currentRawData = data || []; 
    renderFilteredTable();
}

function resetPageAndRender() {
    currentPage = 1;
    renderFilteredTable();
}

function renderFilteredTable() {
    const sourceFilter = document.getElementById("sourceFilter").value;
    const monthFilter = document.getElementById("monthFilter").value;
    const dateFilter = document.getElementById("dateFilter").value;
    const today = new Date().toISOString().split('T')[0];

    const filtered = currentRawData.filter(b => {
        const matchSource = (sourceFilter === "all") || (sourceFilter === "manual" ? (b.source === "manual") : (b.source !== "manual"));
        const bookingMonth = b.check_in ? b.check_in.split("-")[1] : "";
        const matchMonth = (monthFilter === "all") || (bookingMonth === monthFilter);
        const matchDate = (dateFilter === "all") || (b.check_in >= today);
        return matchSource && matchMonth && matchDate;
    });

    let headerHtml = `<tr><th>姓名</th><th>電話</th>`;
    if (currentRoom === "ALL") headerHtml += `<th>房號</th>`;
    headerHtml += `<th>入住</th><th>退房</th><th>金額</th><th>付款狀態</th><th>備註</th><th>操作</th></tr>`;
    document.getElementById("tableHeader").innerHTML = headerHtml;

    const totalPages = Math.ceil(filtered.length / rowsPerPage) || 1;
    if (currentPage > totalPages) currentPage = totalPages || 1;
    const startIndex = (currentPage - 1) * rowsPerPage;
    const paginatedData = filtered.slice(startIndex, startIndex + rowsPerPage);

    let tbody = document.getElementById("bookingTableBody");
    tbody.innerHTML = "";
    paginatedData.forEach(b => {
        let rowClass = (b.source === "manual") ? "row-manual" : "row-booking";
        let statusClass = b.payment_status === "已付清" ? "status-paid" : (b.payment_status === "只付訂金" ? "status-deposit" : "status-none");
        let roomTag = `<span class="room-tag" style="background:${roomColors[b.room] || '#999'}">${b.room}</span>`;

        let amountDisplay = b.amount ? '$' + b.amount : "";
        let statusDisplay = b.payment_status || "";
        if (b.payment_status === "只付訂金" && b.deposit_amount) {
            statusDisplay += ` ($${b.deposit_amount})`;
        }

        let rowHtml = `<tr id="order-${b.id}" class="${rowClass}">
            <td style="font-weight: bold;">${b.guest_name}</td>
            <td>${b.phone || ""}</td>`;
        if (currentRoom === "ALL") rowHtml += `<td>${roomTag}</td>`;
        rowHtml += `
            <td>${formatChineseDate(b.check_in)}</td>
            <td>${formatChineseDate(b.check_out)}</td>
            <td style="font-weight: bold;">${amountDisplay}</td>
            <td class="${statusClass}">${statusDisplay}</td>
            <td style="text-align: left;">${b.note || ""}</td>
            <td>
                <button class="btn-edit" onclick='editBooking(${JSON.stringify(b)})'>修改</button>
                <button class="btn-delete" onclick="deleteBooking(${b.id})">刪除</button>
            </td>
        </tr>`;
        tbody.innerHTML += rowHtml;
    });
    renderPaginationControls(totalPages);
}

function renderPaginationControls(totalPages) {
    const controls = document.getElementById("paginationControls");
    controls.innerHTML = `
        <button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>上一頁</button>
        <span style="margin: 0 5px;">${currentPage} / ${totalPages}</span>
        <button onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>下一頁</button>
    `;
}

function changePage(step) { currentPage += step; renderFilteredTable(); }

// ✨ 重新整合跳轉功能的 selectRoom
async function selectRoom(r) {
    currentRoom = r;
    await loadBookings(r);
}

function initCalendar() {
    calendar = new FullCalendar.Calendar(document.getElementById("calendar"), {
        initialView: "dayGridMonth",
        locale: 'zh-tw',
        height: 'auto',
        fixedWeekCount: false,
        events: async function(fetchInfo, success) {
            let { data } = await supabaseClient.from("bookings").select("*");
            success(data.map(e => ({
                id: e.id, title: `${e.room}: ${e.guest_name}`, start: e.check_in, end: e.check_out, color: roomColors[e.room] || "#999", extendedProps: { room: e.room }
            })));
        },
        eventClick: async function(info) {
            const bId = info.event.id;
            const bRoom = info.event.extendedProps.room;

            // 重設所有篩選器
            document.getElementById("dateFilter").value = "all";
            document.getElementById("sourceFilter").value = "all";
            document.getElementById("monthFilter").value = "all";

            // 跳轉定位函式
            const scrollToOrder = () => {
                const el = document.getElementById(`order-${bId}`);
                if (el) {
                    document.querySelectorAll('.jump-highlight').forEach(row => row.classList.remove('jump-highlight'));
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.add('jump-highlight');
                } else {
                    alert("該訂單在目前分頁找不到，請檢查頁碼或篩選條件。");
                }
            };

            // 如果點擊的訂單不在當前房號下，且目前不是 ALL 模式，則切換房號
            if (currentRoom !== "ALL" && currentRoom !== bRoom) {
                currentRoom = bRoom;
                await loadBookings(bRoom);
                setTimeout(scrollToOrder, 300);
            } else {
                // 如果已在該房號，或是在 ALL 模式下，直接執行定位
                renderFilteredTable();
                scrollToOrder();
            }
        }
    });
    calendar.render();
}

function openBookingForm() {
    document.getElementById("formTitle").innerText = "➕ 新增訂單";
    document.getElementById("editId").value = "";
    document.getElementById("room").value = (currentRoom === "ALL" ? "201" : currentRoom);
    document.getElementById("guest").value = ""; 
    document.getElementById("phone").value = "";
    document.getElementById("checkin").value = ""; 
    document.getElementById("checkout").value = "";
    document.getElementById("amount").value = ""; 
    document.getElementById("deposit_amount").value = "";
    document.getElementById("payment_status").value = "還沒繳錢";
    document.getElementById("note").value = "";
    toggleDepositInput();
    document.getElementById("bookingForm").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closeForm() { document.getElementById("bookingForm").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

async function saveBooking() {
    const id = document.getElementById("editId").value;
    const status = document.getElementById("payment_status").value;
    
    const payload = {
        room: document.getElementById("room").value,
        guest_name: document.getElementById("guest").value,
        phone: document.getElementById("phone").value,
        check_in: document.getElementById("checkin").value,
        check_out: document.getElementById("checkout").value,
        amount: document.getElementById("amount").value || null,
        deposit_amount: (status === "只付訂金") ? (document.getElementById("deposit_amount").value || null) : null,
        payment_status: status,
        note: document.getElementById("note").value
    };

    if (id) {
        await supabaseClient.from("bookings").update(payload).eq("id", id);
    } else {
        payload.source = "manual"; 
        await supabaseClient.from("bookings").insert(payload);
    }
    
    closeForm(); 
    await loadBookings(currentRoom); // 確保儲存後重新抓取
    calendar.refetchEvents();
}

function editBooking(b) {
    document.getElementById("formTitle").innerText = "📝 修改訂單";
    document.getElementById("editId").value = b.id;
    document.getElementById("room").value = b.room;
    document.getElementById("guest").value = b.guest_name;
    document.getElementById("phone").value = b.phone || "";
    document.getElementById("checkin").value = b.check_in;
    document.getElementById("checkout").value = b.check_out;
    document.getElementById("amount").value = b.amount || "";
    document.getElementById("deposit_amount").value = b.deposit_amount || "";
    document.getElementById("payment_status").value = b.payment_status || "還沒繳錢";
    document.getElementById("note").value = b.note || "";
    toggleDepositInput();
    document.getElementById("bookingForm").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

async function deleteBooking(id) {
    if (confirm("確定刪除嗎？")) { 
        await supabaseClient.from("bookings").delete().eq("id", id); 
        await loadBookings(currentRoom); 
        calendar.refetchEvents(); 
    }
}

initCalendar();
selectRoom("201");
</script>

</body>
</html>
